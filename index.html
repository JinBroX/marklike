<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>marklike</title>
<link rel="stylesheet" href="/css/all.min.css?v=2026041825">
<link rel="stylesheet" href="/css/fonts.css?v=2026041701">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%; overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #0d0d0d; color: #fff;
  transition: background 0.5s ease;
}
body.morning { background: linear-gradient(135deg, #f5f0e8 0%, #fff8f0 100%); color: #000; }
body.afternoon { background: linear-gradient(135deg, #fff8f0 0%, #fff5e6 100%); color: #000; }
body.evening { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); color: #fff; }
body.night { background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%); color: #fff; }

.app {
  width: 100%; height: 100%; position: relative; overflow: hidden;
}
.content {
  width: 100%; height: 100%; display: flex; flex-direction: column;
  padding: 70px 28px 100px;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  transition: transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}

.header {
  position: fixed; top: 0; left: 0; width: 100%; z-index: 100;
  padding: 16px 20px; display: flex; justify-content: space-between; align-items: center;
  background: transparent;
  background: linear-gradient(to bottom, rgba(254,249,243,0.8) 0%, transparent 100%);
}
body.evening .header,
body.night .header {
  background: linear-gradient(to bottom, rgba(13,13,13,0.8) 0%, transparent 100%);
}
.logo { font-size: 20px; font-weight: 700; letter-spacing: -1px; display: inline; }
.logo-arrow { color: #c9a96e !important; }
.logo-mark { color: #fff; }
.logo-like { color: #c9a96e; }
body.morning .logo-mark,
body.afternoon .logo-mark { color: #000; }
body.morning .logo,
body.afternoon .logo { color: #000; }
.header-actions { display: flex; gap: 12px; }

/* 底部按钮：圆形透明 */
.icon-btn {
  color: #fff;
  width: 36px; height: 36px; border-radius: 50%; border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  background: transparent; transition: all 0.2s;
}
body.morning .icon-btn,
body.afternoon .icon-btn { color: #333; }
.icon-btn:hover { opacity: 0.7; }
body.morning .icon-btn,
body.afternoon .icon-btn {
  color: #fff; background: transparent; color: rgba(42,37,32,0.7); }
.icon-btn:hover { opacity: 0.7; }

/* header用户按钮：圆角边框样式 */
.user-btn {
  width: auto; height: auto; padding: 6px 14px; border-radius: 18px;
  border: 1px solid rgba(255,255,255,0.25); background: transparent;
  color: #fff; font-size: 12px; font-weight: 500; cursor: pointer;
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  transition: all 0.2s;
}
body.morning .user-btn,
body.afternoon .user-btn { border-color: rgba(0,0,0,0.2); color: #333; }

.logout-btn { display: none; }

.lang-btn {
  padding: 6px 14px; border-radius: 18px; border: 1px solid rgba(255,255,255,0.25);
  background: transparent; color: #fff; font-size: 12px; font-weight: 500; cursor: pointer;
  transition: all 0.2s;
}
body.morning .lang-btn,
body.afternoon .lang-btn { border-color: rgba(0,0,0,0.2); color: #333; }

.main-text {
  font-size: 18px; line-height: 2.2; text-align: left;
  color: #f0f0f0; white-space: pre-wrap; word-break: break-word;
}
.main-text::before {
  content: '› '; color: #c9a96e; font-weight: bold;
}
body.morning .main-text,
body.afternoon .main-text { color: #3a3530; }

.source {
  text-align: left; font-size: 13px; color: rgba(255,255,255,0.4); margin-top: 20px;
  padding-top: 16px; border-top: 1px solid rgba(255,255,255,0.1);
}
body.morning .source,
body.afternoon .source { color: rgba(0,0,0,0.4); border-color: rgba(0,0,0,0.1); }

.actions {
  position: fixed; bottom: 0; left: 0; width: 100%; z-index: 100;
  padding: 16px 20px; display: flex; justify-content: center; align-items: center; gap: 16px;
  background: linear-gradient(to top, rgba(254,249,243,0.8) 0%, transparent 100%);
}
body.evening .actions,
body.night .actions {
  background: linear-gradient(to top, rgba(13,13,13,0.8) 0%, transparent 100%);
}
.action-btn {
  display: flex; align-items: center; justify-content: center;
  background: none; border: none; cursor: pointer;
  color: rgba(255,255,255,0.8); font-size: 18px; transition: all 0.2s;
}
body.morning .action-btn,
body.afternoon .action-btn { color: rgba(0,0,0,0.7); }
.action-btn:hover { color: #4da6ff; transform: scale(1.1); }
.action-btn.active { color: #4da6ff; }

.loading { text-align: center; padding: 60px; color: rgba(255,255,255,0.5); }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body class="night">
<div class="app">
  <div class="header">
    <div class="logo"><span class="logo-mark">mark</span><span class="logo-arrow"></span><span class="logo-like">like</span></div>
    <div class="header-actions">
      <button class="lang-btn" id="langBtn">EN</button>
            <button class="icon-btn user-btn" id="userBtn">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#000"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 4-6 8-6s8 2 8 6"/></svg>
      </button>
    </div>
  </div>

  <div class="content" id="content">
    <div class="loading">加载中...</div>
  </div>

</div>

<script>
function setTheme() {
  const hour = new Date().getHours();
  const body = document.body;
  body.className = '';
  if (hour >= 6 && hour < 12) body.classList.add('morning');
  else if (hour >= 12 && hour < 17) body.classList.add('afternoon');
  else if (hour >= 17 && hour < 20) body.classList.add('evening');
  else body.classList.add('night');
}
setTheme();

const API = "/api";
let currentPage = 1;
let totalPages = 1;
let currentIndex = 0;
let slices = [];
let lang = 'zh';
let currentSliceId = null;
let isAnimating = false;
let favoritedIds = new Set();

async function loadFavorites() {
  const token = localStorage.getItem("token");
  if (!token) { favoritedIds.clear(); return; }
  try {
    const res = await fetch(API + "/favorites", {
      headers: { "Authorization": token }
    });
    if (res.ok) {
      const data = await res.json();
      favoritedIds = new Set((data.favorites || []).map(f => f.slice_id));
    }
  } catch(e) {}
}

function updateBookmarkState() {
  const btn = document.getElementById("bookmarkBtn");
  if (favoritedIds.has(currentSliceId)) {
    btn.classList.add("active");
  } else {
    btn.classList.remove("active");
  }
}

async function loadSlices() {
  try {
    const res = await fetch(API + "/random");
    const data = await res.json();
    slices = data.slice ? [data.slice] : [];
    totalPages = 1;
    currentIndex = 0;
    renderCurrent();
  } catch (err) {
    document.getElementById("content").innerHTML = '<div class="loading">加载失败</div>';
  }
}

function renderCurrent() {
  const s = slices[currentIndex];
  if (!s) return;
  
  currentSliceId = s.id;
  let displayText = s.modern || s.content || '';
  if (lang === 'en' && s.english) displayText = s.english;
  
  const isFav = favoritedIds.has(s.id);
  document.getElementById("content").innerHTML = `
    <div class="main-text">${displayText}<span class="source-inline">—— ${s.source || '佚名'}</span></div>
    <div class="content-divider"></div>
    <div class="content-actions">
      <button class="ca-btn nav-btn" id="prevBtn" title="上一条">
        <svg viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2"><polyline points="18 15 12 9 6 15"/></svg>
      </button>
      <button class="ca-btn icon-btn" id="copyBtn" title="复制">
        <svg viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      </button>
      <button class="ca-btn icon-btn fav-btn${isFav ? ' active' : ''}" id="favBtn">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
      </button>
      <button class="ca-btn icon-btn" id="shareBtn" title="分享">
        <svg viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
      </button>
      <button class="ca-btn nav-btn" id="nextBtn" title="下一条">
        <svg viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
    </div>
  `;
  
  // 绑定按钮事件
  document.getElementById("prevBtn").addEventListener("click", () => goToSlice(-1));
  document.getElementById("nextBtn").addEventListener("click", () => goToSlice(1));
  document.getElementById("copyBtn").addEventListener("click", copyText);
  document.getElementById("shareBtn").addEventListener("click", shareContent);
  document.getElementById("favBtn").addEventListener("click", toggleContentFav);
  
  document.getElementById("content").scrollTop = 0;
}

// 简化的goToSlice - 去掉动画，直接加载新内容
async function goToSlice(direction) {
  console.log('goToSlice:', direction);
  document.getElementById("content").innerHTML = '<div class="loading">加载中...</div>';
  try {
    const res = await fetch(API + "/random");
    const data = await res.json();
    slices = data.slice ? [data.slice] : [];
    currentIndex = 0;
    totalPages = 1;
    currentPage = 1;
    renderCurrent();
  } catch (err) {
    document.getElementById("content").innerHTML = '<div class="loading">加载失败</div>';
  }
}

document.getElementById("langBtn").onclick = () => {
  lang = lang === 'zh' ? 'en' : 'zh';
  document.getElementById("langBtn").textContent = lang === 'zh' ? 'EN' : '中文';
  renderCurrent();
};

document.getElementById("userBtn").onclick = () => {
  const user = localStorage.getItem('user');
  if (user) {
    window.location.href = 'user.html';
  } else {
    window.location.href = 'login.html';
  }
};


let touchStartY = 0;
document.addEventListener("touchstart", (e) => { touchStartY = e.changedTouches[0].screenY; }, { passive: true });
document.addEventListener("touchend", (e) => {
  const diff = e.changedTouches[0].screenY - touchStartY;
  if (diff < -80) goToSlice(1);
  if (diff > 80) goToSlice(-1);
}, { passive: true });

document.addEventListener("keydown", (e) => {
  if (e.key === 'ArrowDown' || e.key === ' ') goToSlice(1);
  if (e.key === 'ArrowUp') goToSlice(-1);
});

function toggleContentFav() {
  if (!currentSliceId) return;
  const token = localStorage.getItem("token");
  if (!token) { alert("请先登录"); return; }
  const btn = document.getElementById('favBtn');
  const isActive = btn.classList.contains('active');
  fetch(API + "/favorites", {
    method: isActive ? "DELETE" : "POST",
    headers: { "Content-Type": "application/json", "Authorization": token },
    body: JSON.stringify({ slice_id: currentSliceId })
  }).then(res => {
    if (res.ok) {
      btn.classList.toggle('active');
      if (btn.classList.contains('active')) {
        favoritedIds.add(currentSliceId);
      } else {
        favoritedIds.delete(currentSliceId);
      }
    }
  });
}

function copyText() {
  const text = document.querySelector('.main-text')?.textContent || '';
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.ca-btn[onclick="copyText()"]');
    btn.classList.add('active');
    setTimeout(() => btn.classList.remove('active'), 1000);
  });
}

function shareContent() {
  const s = slices[currentIndex];
  const shareUrl = window.location.href;
  const shareTitle = s ? (s.source || 'mark>like') : 'mark>like';
  const shareText = s ? (s.modern || s.content || '').substring(0, 100) : '';
  const fullText = shareText ? shareTitle + '\n\n' + shareText.substring(0, 200) + '\n\n链接：' + shareUrl : shareUrl;

  // 显示分享菜单
  const menu = document.createElement('div');
  menu.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:9999;display:flex;align-items:flex-end;justify-content:center;';
  menu.innerHTML = '<div style="background:#fff;border-radius:16px 16px 0 0;padding:20px;width:100%;max-width:500px;">' +
    '<div style="text-align:center;color:#999;font-size:12px;padding:10px;">分享到</div>' +
    '<div style="display:flex;justify-content:space-around;">' +
    '<div id="shareTextBtn" style="text-align:center;cursor:pointer;padding:12px 20px;"><div style="font-size:24px;">📋</div><div style="font-size:12px;color:#333;margin-top:6px;">复制文案</div></div>' +
    '<div id="shareImageBtn" style="text-align:center;cursor:pointer;padding:12px 20px;"><div style="font-size:24px;">🖼️</div><div style="font-size:12px;color:#333;margin-top:6px;">分享图</div></div>
    <div id="shareLinkBtn" style="text-align:center;cursor:pointer;padding:12px 20px;"><div style="font-size:24px;">🔗</div><div style="font-size:12px;color:#333;margin-top:6px;">复制链接</div></div>' +
    '</div></div>';
  document.body.appendChild(menu);

  // 点击背景关闭
  menu.addEventListener('click', (e) => { if (e.target === menu) document.body.removeChild(menu); });

  // 复制文案
  document.getElementById('shareTextBtn').onclick = () => {
    navigator.clipboard.writeText(fullText);
    document.body.removeChild(menu);
    const btn = document.getElementById('shareBtn');
    btn.style.background = 'rgba(255,255,255,0.2)';
    setTimeout(() => btn.style.background = '', 1000);
  };

  // 复制链接
  document.getElementById('shareLinkBtn').onclick = () => {
    navigator.clipboard.writeText(shareUrl);
    document.body.removeChild(menu);
    const btn = document.getElementById('shareBtn');
    btn.style.background = 'rgba(255,255,255,0.2)';
    setTimeout(() => btn.style.background = '', 1000);
  };

  // 生成分享图
  document.getElementById('shareImageBtn').onclick = () => {
    document.body.removeChild(menu);
    generateShareImage();
  };
}

// 生成分享图（长图+二维码）
async function generateShareImage() {
  const s = slices[currentIndex];
  if (!s) return;
  const shareUrl = window.location.href;
  const isDark = !document.body.classList.contains('morning') && !document.body.classList.contains('afternoon');
  const bgColor = isDark ? '#1a1a2e' : '#f5f0e8';
  const textColor = isDark ? 'rgba(255,255,255,0.95)' : 'rgba(0,0,0,0.85)';
  const subColor = isDark ? 'rgba(255,255,255,0.5)' : 'rgba(0,0,0,0.45)';

  let displayText = s.modern || s.content || '';
  if (lang === 'en' && s.english) displayText = s.english;
  const source = s.source || '佚名';

  // 计算文字换行
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  ctx.font = '18px -apple-system, BlinkMacSystemFont, sans-serif';
  const maxWidth = 520;
  const words = displayText.split('');
  let lines = [];
  let line = '';
  for (let char of words) {
    const testLine = line + char;
    if (ctx.measureText(testLine).width > maxWidth && line) {
      lines.push(line);
      line = char;
    } else {
      line = testLine;
    }
  }
  if (line) lines.push(line);
  const textHeight = lines.length * 28;

  // 画布尺寸
  const qrSize = 100;
  const padding = 40;
  const canvasHeight = padding + textHeight + 30 + 20 + qrSize + 80;
  canvas.width = 600;
  canvas.height = canvasHeight;

  // 画背景
  ctx.fillStyle = bgColor;
  ctx.fillRect(0, 0, 600, canvasHeight);

  // 画文字
  ctx.fillStyle = textColor;
  ctx.font = '18px -apple-system, BlinkMacSystemFont, sans-serif';
  ctx.textAlign = 'center';
  let y = padding + 18;
  for (let l of lines) {
    ctx.fillText(l, 300, y);
    y += 28;
  }

  // 画出处
  ctx.fillStyle = subColor;
  ctx.font = '14px -apple-system, BlinkMacSystemFont, sans-serif';
  ctx.fillText('—— ' + source, 300, y + 20);

  // 生成二维码
  const qrDiv = document.createElement('div');
  qrDiv.style.cssText = 'position:fixed;left:-9999px;top:0;width:100px;height:100px;';
  document.body.appendChild(qrDiv);
  new QRCode(qrDiv, { text: shareUrl, width: 100, height: 100 });

  setTimeout(() => {
    const qrImg = qrDiv.querySelector('img') || qrDiv.querySelector('canvas');
    if (qrImg) {
      const qrY = y + 50;
      ctx.fillStyle = subColor;
      ctx.font = '12px -apple-system, BlinkMacSystemFont, sans-serif';
      ctx.fillText('mark>like', 300, qrY + 15);
      ctx.drawImage(qrImg, 250, qrY + 20, qrSize, qrSize);
      ctx.fillText(shareUrl, 300, qrY + qrSize + 45);
    }

    document.body.removeChild(qrDiv);

    canvas.toBlob((blob) => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'marklike-share.png';
      a.click();
      URL.revokeObjectURL(url);

      const btn = document.getElementById('shareBtn');
      btn.style.background = 'rgba(255,255,255,0.2)';
      setTimeout(() => btn.style.background = '', 1000);
    }, 'image/png');
  }, 300);
}

loadFavorites().then(() => loadSlices());
</script>
</body>
</html>
